<!DOCTYPE html>
<html>
    <head>
        <title>Creations | Crean's Website</title>
        <link rel="icon" href="../Assets/Creations.png"/>
        <link rel="stylesheet" href="style.css" rel="stylesheet"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    </head>
    <style>
        @font-face { font-family: WanderersLost; src: url('../Assets/WandererLost\ Font.ttf'); }
        p {
            font-family: WanderersLost;
            background-color: rgba(158, 103, 1, 0.204);
        }
    </style>
    <body>
        <linktab>
            <div style="display: grid;" id="linktabElements">
                <h4 style="font-size: 20px;">Crean</h4>
                <a href="https://creaamblob.github.io/CreanBL.github.io/Code/Main.html">
                    <img src="../Assets/Home.png" class="LinkButtonSmol">
                </a>
                <a>
                    <img src="../Assets/Creations.png" class="LinkButtonSmol">
                </a>
                <a href="https://creaamblob.github.io/CreanBL.github.io/Code/Blogs.html">
                    <img src="../Assets/Blog.png" class="LinkButtonSmol">
                </a>
                <a href="https://creaamblob.github.io/CreanBL.github.io/Code/Info.html">
                    <img src="../Assets/Info.png" class="LinkButtonSmol">
                </a>
            </div>
        </linktab>

        <div class="Title">
            <h1>My Creations</h1>
        </div>

        <center>
            <div class="TextBox" style="width: 800px;">
                <p>Collection of things I have created.</p>

                <h2>Projects</h2>
                <div id="Page1" class="Page">
                    <p style="display: table-caption; width: 100%; image-rendering: pixelated;"><br>
                        <a href="https://creaamblob.github.io/CreanBL.github.io/Code/CreationsFolder/TranscendentMod.html">
                            <img src="../Assets/Creations/TranscendentModThumbnail.png" style="width: 95%; vertical-align: middle; justify-content: left;">
                        </a>
                        <span style="font-size: 25px;">Transcendent Mod</span><br>
                        <span style="font-size: 15px;">A Terraria 1.4.4 content mod for tModloader.</span>
                    </p>
                </div>

                <div id="Page2" class="Page">
                    <p style="display: table-caption; width: 100%; image-rendering: pixelated;"><br>
                        <a href="https://creaamblob.github.io/CreanBL.github.io/Code/CreationsFolder/VTRU.html">
                            <img src="../Assets/Creations/VTRUthumbnail.png" style="width: 95%; vertical-align: middle; justify-content: left;">
                        </a>
                        <span style="font-size: 25px;">Various Threats: Reunleashed</span><br>
                        <span style="font-size: 15px;">A Terraria 1.4.4 mod for tModloader that reworks various bosses.</span>
                    </p>
                </div>
                
                <div style="background-color: gold; width: 10px; height: 10px; border-radius: 10px;" id="PreviewChangeBar"></div><br>

                <div class="ButtonTab" style="display: inline-block; width: 100%; height: 80px;">
                    <button onclick="ChangePreview(1)" class="ChangePageButton" id="ChangePageButton1">1</button>
                    <button onclick="ChangePreview(2)" class="ChangePageButton" id="ChangePageButton2">2</button>
                </div><br>

                <p>Please select a category.</p>
                
                <h3>Programmed</h3>
                <a href="https://creaamblob.github.io/CreanBL.github.io/Code/CreationsFolder/Programming.html" class="Links">
                    <img src="../Assets/Code.png" class="LinkButton">
                </a>
                
                <h3>Drawn</h3>
                <a href="https://creaamblob.github.io/CreanBL.github.io/Code/CreationsFolder/Art.html" class="Links">
                    <img src="../Assets/Gallery.png" class="LinkButton">
                </a>
            </div>
        </center>

        <script>
           var curPreview = 1;
           var changePageTimer = 0;

           setInterval(ChangePreviewAutomatically, 1)
            function ChangePreviewAutomatically() {
                console.log(String(changePageTimer));
                changePageTimer += 1;
                if (changePageTimer > 390) {
                    switch (curPreview) {
                        case 1: ChangePreview(2); break;
                        case 2: ChangePreview(1); break;
                    }

                    changePageTimer = 0;
                }
                document.getElementById("PreviewChangeBar").style.width = (String)(760 - (changePageTimer * 2)) + "px";
            }

            function ChangePreview(goPreview) {

                if (curPreview < 1) {
                    curPreview = 1;
                }

                var loop, buttonID, button, contents;
                buttonID = document.getElementById(String("ChangePageButton" + goPreview));
                contents = document.getElementById(String("Page" + curPreview));
                upcomingContents = document.getElementById(String("Page" + goPreview));

                button = document.getElementsByClassName("ChangePageButton");
                for (loop = 0; loop < button.length; loop++)
                {
                    button[loop].className = button[loop].className.replace(" active", "");
                }

                buttonID.className += " active";
                contents.style.display = "none";
                upcomingContents.style.display = "block";
                curPreview = goPreview;
                changePageTimer = 0;
            }
            ChangePreview(2);
            ChangePreview(1);
        </script>
    </body>
</html>
