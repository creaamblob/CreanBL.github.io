<!DOCTYPE html>
<html>
    <head>
        <title>Crean's Website</title>
        <link rel="icon" href="../Assets/CreanBL.png"/>
        <link rel="stylesheet" href="style.css" rel="stylesheet"/>
    </head>

    <div class="SmallScreenWarn">
        <div class="SmallScreenContain">
            Your screen is too small!
            Please enable desktop mode in your browser!
            (Usually found in a triple-dot dropdown)
        </div>
    </div>
    
    <style>
        @font-face { font-family: WanderersLost; src: url('../Assets/WandererLost\ Font.ttf'); }
        p {
            font-family: WanderersLost;
            font-size: 15px;
            background-color: rgba(158, 103, 1, 0.204);
        }
        font:hover {
            color: deepskyblue;
            text-decoration: underline;
            font-size: 35px;
        }
    </style>
    <body>
        <center>
            <br><br>
            <div class="RetroWindow" style="width: 300px; height: 300px;">

                <!-- Window Label + Buttons -->
                 <div style="border: 4px rgb(0, 0, 0) ridge; height: 25px; padding: 5px; width: 92%; font-size: 17px; display: flex; vertical-align: middle;">
                    
                    <div style="width: 49.9999%; font-size: 17px; display: flex; text-align: left;">
                        Signed!
                    </div>
                    
                    <div style="width: 49.9999%; font-size: 17px; display: flex; text-align: right; justify-content: right;">
                        <img style="image-rendering: pixelated; border-radius: 2px; padding-right: 2px;" src="../Assets/MinimizeButton.png">
                        <img style="image-rendering: pixelated; border-radius: 2px; padding-right: 2px;" src="../Assets/MaximiseButton.png">
                        <img style="image-rendering: pixelated; border-radius: 2px;" src="../Assets/CloseButton.png">
                    </div>
                </div>

                <div class="WindowContainer" style="height: 135px; display: flex; vertical-align: middle; justify-content: center; text-align: center;">
                    <a href="https://creaamblob.github.io/CreanBL.github.io/Code/Main.html" style="text-underline-offset: 10px; display: flex; vertical-align: middle; color: white; text-decoration: none;">
                        <font style="transition: 0.5s; margin: auto; vertical-align: middle;">Return</font>
                    </a>
                </div>

            </div>
        </center>
    </body>
</html>
