        <script>
            setInterval(UpdateTime, 1);
            function UpdateTime() {
                var date = new Date();
                var myHours = date.getUTCHours() + 2;
                if (myHours > 23) {
                    myHours -= 24;
                }
                var myMinutes = date.getUTCMinutes();
                var mySeconds = date.getUTCSeconds();

                if (myHours < 10) {
                    myHours = "0" + String(myHours);
                }
                if (myMinutes < 10) {
                    myMinutes = "0" + String(myMinutes);
                }
                if (mySeconds < 10) {
                    mySeconds = "0" + String(mySeconds);
                }
                document.getElementById("time").innerHTML = String(myHours) + " : " + String(myMinutes) + " : " + String(mySeconds);
            }
        </script>
