            setInterval(UpdateTime, 100);

            function UpdateTime() {
                const date = new Date();
                const offSet = date.getTimezoneOffset() * 60 * 1000;
                const UTCtime = date.getTime() + offSet;
                const UTCoffset = 2 * 60 * 60 * 1000;
                const FinlandTime = UTCtime + UTCoffset;
                const FinlandTime2 = new Date(FinlandTime);

            }
