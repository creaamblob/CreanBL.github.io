<!DOCTYPE html>
<html>
    <head>
        <title>Crean's Website</title>
        <link rel="icon" href="Assets/CreanBL.png"/>
        <link rel="stylesheet" href="Code/style.css" rel="stylesheet"/>
    </head>

    <style>
       @font-face { font-family: WanderersLost; src: url('Assets/WandererLost\ Font.ttf'); }
       p {
        font-family: WanderersLost;
        font-size: 15px;
        background-color: rgba(158, 103, 1, 0.204);
       }
       h3 {
        transition: 0.5s;
       }
       h3:hover {
        transform: scale(1.33);
       }
    </style>
    <body>
        <center style="vertical-align: middle;">
            <br><br>
            <div class="RetroWindow">
                <!-- Window Label + Buttons -->
                <div style="border: 4px rgb(0, 0, 0) ridge; height: 25px; padding: 5px; width: 97%; font-size: 17px; display: flex; vertical-align: middle;">

                    <div style="width: 49.9999%; font-size: 12px; display: flex; text-align: left; margin-top: 6px;">
                        Border of Common Sense
                    </div>
                    
                    <div style="width: 49.9999%; font-size: 17px; display: flex; text-align: right; justify-content: right;">
                        <img style="image-rendering: pixelated; border-radius: 2px; padding-right: 2px;" src="Assets/MinimizeButton.png">
                        <img style="image-rendering: pixelated; border-radius: 2px; padding-right: 2px;" src="Assets/MaximiseButton.png">
                        <img style="image-rendering: pixelated; border-radius: 2px;" src="Assets/CloseButton.png">
                    </div>
                </div>

                <div class="WindowContainer">
                    <h4 style="text-decoration: none;">You will be automatically redirected after <font style="color: gold;" id="Timer">10</font> seconds.</h4>
                    <p>
                        If you're on MOBILE, PLEASE enable DESKTOP VIEW.<br>
                        I didn't bother with adding proper mobile support.
                    </p>
                    <a href="https://creaamblob.github.io/CreanBL.github.io/Code/Main.html" style="text-underline-offset: 10px; text-decoration: none;">
                        <h3>Enter the site</h3>
                    </a>
                </div>
            </div>
            <script>
                var TimerAmount = 10;
                setInterval(UpdateTimer, 1000);

                function UpdateTimer() {
                    TimerAmount -= 1;
                    if (TimerAmount < 1) {
                        window.location.replace("https://creaamblob.github.io/CreanBL.github.io/Code/Main.html");
                    }
                    document.getElementById("Timer").innerHTML = TimerAmount;
                }
            </script>
        </center>
    </body>
</html>
